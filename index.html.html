<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembukuan UMKM</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #eef2f7;
  margin: 0;
  padding: 10px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 12px;
}

th, td {
  padding: 6px;
  text-align: center;
  border-bottom: 1px solid #ddd;
}

th {
  background: #4CAF50;
  color: white;
}

.total {
  margin-top: 10px;
  font-weight: bold;
  text-align: right;
}

footer {
  text-align: center;
  font-size: 12px;
  margin-top: 15px;
  color: gray;
}
</style>
</head>

<body>

<div class="container">
  <h2>Pembukuan UMKM</h2>

  <input type="date" id="tanggal">
  <input type="text" id="keterangan" placeholder="Keterangan">

  <select id="jenis">
    <option value="Masuk">Uang Masuk</option>
    <option value="Keluar">Uang Keluar</option>
  </select>

  <input type="number" id="qty" placeholder="Qty">
  <input type="number" id="harga" placeholder="Harga">

  <button onclick="tambahData()">Tambah</button>

  <table id="tabel">
    <thead>
      <tr>
        <th>Tgl</th>
        <th>Ket</th>
        <th>Jenis</th>
        <th>Qty</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="total" id="totalSaldo">Saldo: 0</div>

  <footer>
    Pembukuan UMKM Oktavian Alyandra .Skom
  </footer>
</div>

<script>
let saldo = 0;

function tambahData() {
  let tgl = document.getElementById("tanggal").value;
  let ket = document.getElementById("keterangan").value;
  let jenis = document.getElementById("jenis").value;
  let qty = parseInt(document.getElementById("qty").value) || 0;
  let harga = parseInt(document.getElementById("harga").value) || 0;

  let total = qty * harga;

  if (jenis === "Masuk") {
    saldo += total;
  } else {
    saldo -= total;
  }

  let table = document.getElementById("tabel").getElementsByTagName('tbody')[0];
  let row = table.insertRow();

  row.innerHTML = `
    <td>${tgl}</td>
    <td>${ket}</td>
    <td>${jenis}</td>
    <td>${qty}</td>
    <td>${total}</td>
  `;

  document.getElementById("totalSaldo").innerText = "Saldo: " + saldo;

  // reset input
  document.getElementById("keterangan").value = "";
  document.getElementById("qty").value = "";
  document.getElementById("harga").value = "";
}
</script>

</body>
</html>
